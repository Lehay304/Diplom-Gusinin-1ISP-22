<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="regHeader">
        <div class="regHeaderCancel">
            <button class="headerCancelBtn"><- Назад</button>
        </div>
    </header>
    <main class="regMain">
        <form class="regForm" action="" method="get">
            <div class="regFormTitle">
                <p>Регистрация</p>
            </div>
            <div class="regFormFio">
                <input type="text" placeholder="Имя">
                <input type="text" placeholder="Фамилия">
            </div>
            <div class="regFormInput">
                <input type="text" placeholder="Номер телефона">
                <input type="email" placeholder="Электронная почта">
                <input type="password" placeholder="Пароль">
                <input type="password" placeholder="Повтор пароля">
            </div>
            <div class="regFormSubmit">
                <button >Регистрация</button>
            </div>
            <div class="regFormLogin">
                <a href="login.html">Уже есть аккаунт?</a>
            </div>
        </form>
    </main>
</body>
</html>
