<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="loginHeader">
        <div class="loginHeaderCancel">
            <button class="headerCancelBtn"><- Назад</button>
        </div>
    </header>
    <main class="loginMain">
        <form class="loginForm" action="" method="get">
            <div class="loginFormTitle">
                <p>Вход</p>
            </div>
            <div class="loginFormInput">
                <input type="text" placeholder="Электронная почта">
                <input type="password" placeholder="Пароль">
            </div>
            <div class="loginFormSubmit">
                <button class="loginFormBtn" type="submit">Войти</button>
                
            </div>
            <div class="loginFormReg">
                <a href="registration.html">Нет аккаунта?</a>
            </div>
        </form>
    </main>
</body>
</html>
